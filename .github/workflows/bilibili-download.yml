name: Bilibili Video Download + Transcript

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'B站视频 URL'
        required: true
        type: string
      cookies_b64:
        description: 'Cookies (Base64)'
        required: false
        type: string
      whisper_model:
        description: 'Whisper 模型'
        required: false
        type: choice
        default: 'base'
        options:
          - 'tiny'
          - 'base'
          - 'small'
          - 'medium'
          - 'large'
      commit_result:
        description: '自动提交结果?'
        required: false
        type: boolean
        default: false

jobs:
  download-and-transcribe:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python deps
        run: pip install yt-dlp openai-whisper

      - name: Decode cookies
        if: inputs.cookies_b64 != ''
        run: echo '${{ inputs.cookies_b64 }}' | base64 -d > cookies.txt

      - name: Download video
        shell: bash
        run: |
          URL="${{ inputs.video_url }}"
          if [ -f cookies.txt ]; then
            yt-dlp --cookies cookies.txt --user-agent "Mozilla/5.0" --write-auto-sub --sub-langs zh,zh-CN,zh-TW,en --convert-subs srt -o '%(title)s.%(ext)s' "$URL"
          else
            yt-dlp --write-auto-sub --sub-langs zh,zh-CN,zh-TW,en --convert-subs srt -o '%(title)s.%(ext)s' "$URL"
          fi

      - name: Extract audio
        shell: bash
        run: |
          VIDEO=$(find . -maxdepth 1 \( -name "*.mp4" -o -name "*.flv" -o -name "*.mkv" \) | head -1)
          if [ -n "$VIDEO" ]; then
            ffmpeg -i "$VIDEO" -ar 16000 -ac 1 -c:a pcm_s16le audio.wav -y
          fi

      - name: Transcribe
        shell: bash
        run: python3 transcribe.py '${{ inputs.whisper_model }}'

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results
          path: transcript_full.txt,transcript_segmented.txt,transcript.json,audio.wav
          retention-days: 30

      - name: Upload video
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: video
          path: "*.mp4 *.flv *.mkv *.srt *.vtt"
          retention-days: 7
